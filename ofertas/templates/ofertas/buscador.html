{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador — JobTracker</title>
    <link rel="stylesheet" href="{% static 'ofertas/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>

<nav class="navbar">
    <a href="{% url 'inicio' %}" class="navbar-brand">JobTracker</a>
    <div class="navbar-nav">
        <a href="{% url 'buscador' %}" class="nav-link active">
            <i class="ti ti-search"></i> Buscador
        </a>
        <div class="navbar-divider"></div>
        <a href="{% url 'lista_ofertas' %}" class="nav-link">Nuevas</a>
        <a href="{% url 'ofertas_vistas' %}" class="nav-link">Vistas</a>
        <a href="{% url 'ofertas_guardadas' %}" class="nav-link">Guardadas</a>
        <a href="{% url 'ofertas_descartadas' %}" class="nav-link">Descartadas</a>
    </div>
</nav>

<div class="container" style="max-width: 600px; margin-top: 48px;">
    <div class="form-card">
        <h1 class="form-title">¿Qué oferta estás buscando?</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Palabras clave</label>
                <input type="text" name="keywords" class="form-control" placeholder="DevOps, cloud, Kubernetes..." value="{{ request.session.keywords|default:'' }}">
            </div>

            <div class="form-group">
                <label class="form-label">Ubicación</label>
                <input type="text" name="ubicacion" class="form-control" placeholder="Valencia, Madrid, Barcelona..." value="{{ request.session.ubicacion|default:'' }}">
            </div>

            <div class="form-group">
                <label class="form-label">Modalidad</label>
                <select name="modalidad" class="form-control">
                    <option value="">Cualquiera</option>
                    <option value="remoto">Remoto</option>
                    <option value="hibrido">Híbrido</option>
                    <option value="presencial">Presencial</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Experiencia</label>
                <select name="experiencia" class="form-control">
                    <option value="">Cualquiera</option>
                    <option value="0">Sin experiencia</option>
                    <option value="1">1 año o menos</option>
                    <option value="2">2 años o menos</option>
                    <option value="3">3 años o menos</option>
                    <option value="5">+5 años</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Salario mínimo (opcional)</label>
                <input type="number" name="salario_min" class="form-control" placeholder="Ej: 25000" value="{{ request.session.salario_min|default:'' }}">
            </div>

            <div style="text-align: center; margin-top: 16px;">
                <button type="submit" class="btn btn-primary" style="padding: 8px 24px; font-size: 14px;">
                    Buscar ofertas
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
